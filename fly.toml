# fly.toml app configuration file.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
# Set `app` to your own Fly application name before deploying.
#

app = 'coin-tracker'
primary_region = 'ams'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  # Set PHX_HOST to your own public hostname (or override via `fly secrets set`).
  PHX_HOST = 'your-domain.example.com'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
